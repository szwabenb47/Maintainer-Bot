name: Feature request
description: Suggest a maintainer workflow or improvement.
title: "feature: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Maintainer problem
      description: What maintainer workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like Maintainer-Bot to support.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional context, related tools, or existing workflows.
    validations:
      required: false
