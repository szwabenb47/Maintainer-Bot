name: Bug report
description: Report a reproducible problem in Maintainer-Bot.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the workflow config, event type, and relevant logs.
      placeholder: |
        1. Configure the action with ...
        2. Open a pull request ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main, v0.1.0, or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: GitHub-hosted runner, self-hosted runner, Node.js version, or other relevant details.
    validations:
      required: false
