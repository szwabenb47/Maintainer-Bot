name: Maintainer Bot
description: OSS maintainer automation for issue triage, pull request summaries, and release workflows.
author: szwabenb47

inputs:
  github-token:
    description: Token used to read GitHub metadata and optionally post comments.
    required: false
    default: ${{ github.token }}
  openai-api-key:
    description: Optional OpenAI API key for AI-assisted summaries.
    required: false
  model:
    description: OpenAI model used when AI-assisted mode is enabled.
    required: false
    default: gpt-5.5
  mode:
    description: Workflow mode: auto, issue, pull_request, or release.
    required: false
    default: auto
  dry-run:
    description: Avoid OpenAI calls and comments when true.
    required: false
    default: "true"
  post-comment:
    description: Post the generated report as a GitHub comment when true.
    required: false
    default: "false"
  max-diff-files:
    description: Maximum number of changed PR files included in context.
    required: false
    default: "20"
  max-diff-chars:
    description: Maximum diff characters included in AI-assisted context.
    required: false
    default: "12000"

outputs:
  summary:
    description: Markdown summary generated by the action.
  mode:
    description: Mode selected for the current event.

runs:
  using: node20
  main: src/index.js

branding:
  icon: check-circle
  color: blue
